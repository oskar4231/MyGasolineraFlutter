plugins {
    id("com.android.application")
    id("kotlin-android")
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id("dev.flutter.flutter-gradle-plugin")
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.example.my_gasolinera"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11.toString()
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.my_gasolinera"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion = flutter.minSdkVersion // flutter_secure_storage requiere mínimo API 18; 21 cubre 99%+ de dispositivos
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }


    // ✅ ABI Splits - Flutter maneja esto automáticamente
    // No necesitamos configuración manual de splits
    // Flutter genera APKs separados por defecto cuando se usa --split-per-abi

    buildTypes {
        release {
            // Use release signing if keystore exists, otherwise use debug signing
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug

            // ✅ ProGuard activado — crash handler mostrará en pantalla qué falla
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    lintOptions {
        disable 'InvalidPackage'
        checkReleaseBuilds false
        abortOnError false
    }
}

dependencies {
    // Forzar dependencias principales de AndroidX para compatibilidad del InputMethod / Teclado
    implementation "androidx.core:core:1.13.1"
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.window:window:1.3.0"
    implementation "androidx.window:window-java:1.3.0"
}

configurations.all {
    resolutionStrategy {
        force 'androidx.core:core:1.13.1'
        force 'androidx.core:core-ktx:1.13.1'
        force 'androidx.window:window:1.3.0'
        force 'androidx.window:window-java:1.3.0'
        force 'androidx.lifecycle:lifecycle-common:2.8.2'
        force 'androidx.lifecycle:lifecycle-common-java8:2.8.2'
    }
}

flutter {
    source = "../.."
}
